pre-commit:
  parallel: true
  commands:
    check:
      glob: "*.{ts,js,svelte}"
      run: bun run check
      stage_fixed: true

pre-push:
  commands:
    build:
      run: bun run build

post-merge:
  commands:
    scrape:
      run: bun run scrape

post-rewrite:
  commands:
    scrape:
      run: bun run scrape
